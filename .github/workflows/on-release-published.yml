name: Publish release JARs and Docker images

on:
  release:
    types: [published]

jobs:
  publish-node-image:
    name: Publish Waves Node to Docker Hub
    uses: ./.github/workflows/publish-docker-image.yml
    with:
      raw-docker-tags: |
        type=match,pattern=v(.*),group=1
        type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
      environment: Docker Hub
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    secrets:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

  push-private-node-image:
    name: Publish Private Node to Docker Hub
    environment: Docker Hub
    needs: publish-node-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - id: meta-private
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: wavesplatform/waves-private-node
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          platforms: linux/amd64,linux/arm64
          context: ./docker/private
          push: ${{ github.event_name == 'release' }}
          pull: true
          tags: ${{ steps.meta-private.outputs.tags }}
          build-args: |
            baseImage=wavesplatform/wavesnode@${{ needs.publish-node-image.outputs.digest }}

  publish-ride-runner-image:
    name: Publish RIDE Runner to Docker Hub
    environment: Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'
      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - run: sbt --batch 'buildRIDERunnerForDocker'
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - id: meta-ride-runner
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: wavesplatform/ride-runner
          flavor: latest=false
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ./ride-runner/docker
          push: ${{ github.event_name == 'release' }}
          pull: true
          tags: ${{ steps.meta-ride-runner.outputs.tags }}

  publish-release-jars:
    environment: prod
    name: Publish JARs to Sonatype
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: sbt-version
        run: |
          sbt_version=$(cut -d\" -f2 version.sbt)
          echo "sbt_version=$sbt_version" >> "$GITHUB_OUTPUT"
      - if: format('v{0}', steps.sbt-version.outputs.sbt_version) != github.ref_name
        env:
          SBT_VERSION: ${{ steps.sbt-version.outputs.sbt_version }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          echo "::error::Release version $RELEASE_VERSION does not match SBT version $SBT_VERSION"
          exit 1
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'
          gpg-private-key: ${{ secrets.OSSRH_GPG_KEY }}
          gpg-passphrase: ${{ secrets.OSSRH_GPG_PASSPHRASE }}
      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - name: Publish release jars
        env:
          SONATYPE_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          PGP_PASSPHRASE: ${{ secrets.OSSRH_GPG_PASSPHRASE }}
        run: |
          sbt --batch ";publishSigned;sonaRelease"

