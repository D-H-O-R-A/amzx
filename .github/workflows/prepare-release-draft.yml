name: Prepare release draft
run-name: Prepare release draft for ${{ inputs.version }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      networks:
        description: 'Networks'
        required: true
        default: 'mainnet testnet stagenet'
      version:
        description: 'Version'
        required: true

jobs:
  prepare-release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'
      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - run: ./.github/workflows/prepare-release-draft.sh
        id: prepare-release-draft
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_NETWORKS: ${{ inputs.networks }}
          RELEASE_BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.prepare-release-draft.outputs.subject-path }}
